services:
  # 1. Kafka
  kafka:
    image: bitnamilegacy/kafka:3.9
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

  # 2. Spark Application
  spark-app:
    build: .
    depends_on:
      - kafka
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./checkpoints:/opt/bitnami/spark/checkpoints
    command: >
      spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.5,io.delta:delta-spark_2.12:3.3.0
      stream-processor.py

  # 3. Producer
  pm-producer:
    build: .
    depends_on:
      - kafka
    entrypoint: [ "python", "/opt/bitnami/spark/producer.py" ]